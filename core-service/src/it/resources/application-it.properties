# ==================== DATABASE ====================
spring.r2dbc.username=postgres
spring.r2dbc.password=postgres
spring.flyway.user=postgres
spring.flyway.password=postgres
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.enabled=true

# ==================== SCHEDULER ====================
# run promotion every 2 seconds for tests
scheduler.promotion.fixed-delay=2000
# promotion window 1 minute ? catches "long" timers with delay > intake threshold
scheduler.promotion.window-millis=60000
# run recovery every 2 seconds for tests
scheduler.recovery.fixed-delay=2000
scheduler.recovery.max-attempts=3
# stuck processing threshold 10 seconds for tests
scheduler.recovery.stuck-processing-millis=10000
# heartbeat every 2 seconds for tests
scheduler.heartbeat.interval-millis=2000