# ==================== SERVER ====================
server.port=8080

# ==================== DATABASE (R2DBC - Reactive) ====================
spring.r2dbc.url=r2dbc:postgresql://localhost:5432/temenos_db
spring.r2dbc.username=postgres
spring.r2dbc.password=postgres

# ==================== FLYWAY ====================
spring.flyway.enabled=true
spring.flyway.url=jdbc:postgresql://localhost:5432/temenos_db
spring.flyway.user=postgres
spring.flyway.password=postgres
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ==================== REDIS ====================
spring.redisson.url=redis://localhost:6379

# ==================== SCHEDULER ====================
scheduler.promotion.fixed-delay=300000
scheduler.promotion.window-millis=3600000